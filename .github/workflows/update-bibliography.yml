name: Refresh bibliography

# Weekly ADS sync. Opens a PR instead of pushing directly to main so a
# human still reviews the diff (author formatting / venue edge cases per
# update_bibliography.py's docstring) before it goes live.
on:
  schedule:
    - cron: '0 12 * * 1'  # every Monday, 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests

      - name: Run update_bibliography.py
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
        run: python3 update_bibliography.py

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Refresh publications & citation counts from ADS"
          title: "Automated bibliography refresh"
          body: >
            Auto-generated by the weekly `update-bibliography` workflow.
            Refreshes both the "Refereed Publications" list and the "Most Cited
            Publications" section (top 5 by ADS citation count). Review the diff
            before merging — check new entries for unusual venues or author-name
            edge cases per `update_bibliography.py`'s docstring. Note that
            citation counts drift week to week, so the most-cited block will
            usually show a diff even with no new papers.
          branch: bot/update-bibliography
          delete-branch: true
